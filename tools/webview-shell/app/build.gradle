plugins {
    id 'com.android.application'
}

android {
    namespace 'com.yarub.htmlstudio'
    compileSdk 34
    buildToolsVersion '35.0.0'

    defaultConfig {
        applicationId 'com.yarub.htmlstudio'
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName '1.1'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.webkit:webkit:1.11.0'
}
